apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: python-app-set
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - env: dev
            namespace: dev
            valuesFile: values-dev.yaml
            autoSync: "true"
          - env: prod
            namespace: prod
            valuesFile: values-prod.yaml
            autoSync: "false"
  template:
    metadata:
      name: "python-app-set-{{ .env }}"
      labels:
        app.kubernetes.io/part-of: devops-python-app
        app.kubernetes.io/managed-by: applicationset
        environment: "{{ .env }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/Ge-os/DevOps-Core-Course.git
        targetRevision: lab13
        path: k8s/devops-python-app
        helm:
          valueFiles:
            - "{{ .valuesFile }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .autoSync "true" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    {{- end }}