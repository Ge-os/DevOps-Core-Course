replicaCount: 3

image:
  repository: ge0s1/devops-python-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

container:
  port: 5000

appConfig:
  host: 0.0.0.0
  port: "5000"
  debug: "false"
  appEnv: development
  logLevel: INFO

configMap:
  file:
    enabled: true
    name: ""
    fileName: config.json
    mountPath: /config
  env:
    enabled: true
    name: ""
    data:
      APP_NAME: devops-info-service
      FEATURE_VISITS_COUNTER: "true"

persistence:
  enabled: true
  name: ""
  accessMode: ReadWriteOnce
  size: 100Mi
  storageClass: ""
  mountPath: /data
  visitsFileName: visits

extraEnv: []

secret:
  enabled: true
  type: Opaque
  name: ""
  data:
    username: __PLACEHOLDER_USERNAME__
    password: __PLACEHOLDER_PASSWORD__
    api_key: __PLACEHOLDER_API_KEY__

serviceAccount:
  create: true
  name: ""
  annotations: {}

vault:
  enabled: false
  role: devops-python-app-role
  secretPath: secret/data/myapp/config
  fileName: config
  mountPath: /vault/secrets
  injectCommand: echo Vault secret rendered to /vault/secrets/config
  template: |
    {{- with secret "secret/data/myapp/config" -}}
    APP_USERNAME={{ .Data.data.username }}
    APP_PASSWORD={{ .Data.data.password }}
    API_KEY={{ .Data.data.api_key }}
    {{- end -}}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

hooks:
  enabled: true
  image: busybox:1.36
  preInstall:
    weight: -5
    command: "echo Pre-install validation started; sleep 5; echo Pre-install validation complete"
  postInstall:
    weight: 5
    command: "echo Post-install smoke check started; sleep 5; echo Post-install smoke check complete"

nameOverride: ""
fullnameOverride: ""
