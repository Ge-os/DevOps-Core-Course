replicaCount: 3

image:
  repository: ge0s1/devops-python-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

container:
  port: 5000

env:
  - name: HOST
    value: 0.0.0.0
  - name: PORT
    value: "5000"
  - name: DEBUG
    value: "false"
  - name: LOG_LEVEL
    value: INFO

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

hooks:
  enabled: true
  image: busybox:1.36
  preInstall:
    weight: -5
    command: "echo Pre-install validation started; sleep 5; echo Pre-install validation complete"
  postInstall:
    weight: 5
    command: "echo Post-install smoke check started; sleep 5; echo Post-install smoke check complete"

nameOverride: ""
fullnameOverride: ""
