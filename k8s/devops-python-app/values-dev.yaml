replicaCount: 1

rollout:
  strategy: canary
  blueGreen:
    autoPromotionEnabled: false

image:
  tag: latest

appConfig:
  appEnv: development
  logLevel: DEBUG

service:
  type: NodePort
  nodePort: 30080

persistence:
  size: 100Mi

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 10

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
