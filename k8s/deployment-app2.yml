apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-python-app-v2
  labels:
    app: devops-python-app-v2
    tier: backend
    component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: devops-python-app-v2
  template:
    metadata:
      labels:
        app: devops-python-app-v2
        tier: backend
        component: api
    spec:
      containers:
        - name: devops-python-app-v2
          image: ge0s1/devops-python-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "5000"
            - name: DEBUG
              value: "false"
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
