apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-python-app-v2.fullname" . }}-service
  labels:
    {{- include "devops-python-app-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: service
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "devops-python-app-v2.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
