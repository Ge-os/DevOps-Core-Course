apiVersion: v1
kind: Service
metadata:
  name: devops-python-app-service
  labels:
    app: devops-python-app
    component: service
spec:
  type: NodePort
  selector:
    app: devops-python-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
