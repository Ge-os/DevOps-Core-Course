---
# Installation block includes repository setup and package installation.
# Rescue retries key/repository setup to handle transient network or GPG fetch issues.
- name: Docker installation block
  block:
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

  rescue:
    - name: Wait before retrying Docker repository setup
      wait_for:
        timeout: 10

    - name: Retry adding Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry adding Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Retry apt cache update after Docker repo setup
      apt:
        update_cache: yes

    - name: Retry Docker package installation
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

  always:
    - name: Ensure Docker service is enabled and started
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker
    - docker_install

# Configuration block is independently runnable via --tags docker_config.
- name: Docker configuration block
  block:
    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker for Ansible Docker modules
      apt:
        name: python3-docker
        state: present

  become: true
  tags:
    - docker
    - docker_config
