services:
  devops-info-service:
    build: .
    container_name: devops-info-service
    ports:
      - "5000:5000"
    environment:
      HOST: 0.0.0.0
      PORT: "5000"
      DEBUG: "false"
      LOG_LEVEL: INFO
      VISITS_FILE: /data/visits
    volumes:
      - ./data:/data
    restart: unless-stopped
